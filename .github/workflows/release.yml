name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$PKG_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: Build release zip
        run: |
          zip -r "clawdtalk-client-${{ steps.version.outputs.version }}.zip" . \
            -x ".git/*" "node_modules/*" ".backup/*" ".connect.log" ".connect.pid" \
               ".DS_Store" ".missions_state.json" "clawdtalk-client-*.zip" \
               "clawdtalk-client-*.sha256" "skill-config.json" ".github/*"

      - name: Generate SHA256 checksum
        run: |
          sha256sum "clawdtalk-client-${{ steps.version.outputs.version }}.zip" \
            > "clawdtalk-client-${{ steps.version.outputs.version }}.sha256"
          cat "clawdtalk-client-${{ steps.version.outputs.version }}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            clawdtalk-client-${{ steps.version.outputs.version }}.zip
            clawdtalk-client-${{ steps.version.outputs.version }}.sha256
